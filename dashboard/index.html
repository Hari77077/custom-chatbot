<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS — AI-powered IoT monitoring assistant with real-time safety analytics">
    <title>JARVIS — AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn" title="New chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    <span>New chat</span>
                </button>
                <button class="sidebar-close-btn" id="sidebarCloseBtn" title="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>

            <div class="sidebar-search">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search conversations..." autocomplete="off">
            </div>

            <div class="conversation-list" id="conversationList">
                <!-- Populated by JS -->
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-brand">
                    <div class="brand-dot"></div>
                    <span>JARVIS v1.0</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header" id="chatHeader">
                <button class="sidebar-toggle" id="sidebarToggle" title="Open sidebar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="header-title">
                    <h1>JARVIS</h1>
                    <span class="model-badge">Gemini 2.5 Flash</span>
                </div>
                <div class="header-actions">
                    <button id="voiceToggle" class="voice-toggle active" title="Toggle Voice Output">
                        <svg class="icon-unmuted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                        <svg class="icon-muted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <line x1="23" y1="9" x2="17" y2="15"></line>
                            <line x1="17" y1="9" x2="23" y2="15"></line>
                        </svg>
                    </button>
                </div>
                <div class="header-spacer"></div>
            </header>

            <div class="messages-wrapper" id="messagesWrapper">
                <div class="messages-container" id="messagesContainer">
                    <!-- Welcome Screen -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#starGrad)" stroke="none"/>
                                <defs>
                                    <linearGradient id="starGrad" x1="2" y1="2" x2="22" y2="22">
                                        <stop offset="0%" stop-color="#8ab4f8"/>
                                        <stop offset="100%" stop-color="#c58af9"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h2 class="welcome-title">Hello, how can I help you today?</h2>
                        <p class="welcome-subtitle">Your AI-powered chatbot assistant</p>
                        <div class="suggestion-chips" id="suggestionChips">
                            <button class="chip" data-prompt="Explain how your local RAG capabilities and ChromaDB memory system works">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                <span>Local RAG Capabilities</span>
                            </button>
                            <button class="chip" data-prompt="Write a Python function to sort a list of dictionaries by a specific key">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                <span>Write some code</span>
                            </button>
                            <button class="chip" data-prompt="What are you capable of? Tell me about your tech stack and features.">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                                <span>Your capabilities</span>
                            </button>
                            <button class="chip" data-prompt="Help me brainstorm ideas for a weekend project">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                <span>Brainstorm ideas</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area" id="inputArea">
                <video id="webcamVideo" class="hidden" autoplay playsinline></video>
                <canvas id="webcamCanvas" class="hidden"></canvas>
                <div class="attachment-preview-container hidden" id="attachmentPreviewContainer">
                    <img id="imagePreview" src="" alt="Attachment preview">
                    <button id="removeAttachmentBtn" class="remove-attachment-btn" title="Remove attachment">✕</button>
                </div>
                <div class="input-container" id="inputContainer">
                    <div class="audio-indicator" id="audioIndicator">
                        <div class="audio-pulse"></div>
                        <span class="audio-timer" id="audioTimer">0:00</span>
                        <button class="audio-cancel-btn" id="audioCancelBtn" title="Cancel recording">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <textarea id="messageInput" placeholder="Message JARVIS..." rows="1" autocomplete="off"></textarea>
                    <div class="input-actions">
                        <input type="file" id="fileInput" accept="image/*,.txt,.pdf,.md" class="hidden">
                        <button class="webcam-btn" id="webcamBtn" title="Take a picture">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </button>
                        <button class="attach-btn" id="attachBtn" title="Attach image or document">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <button class="mic-btn" id="micBtn" title="Record voice message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                        <button class="send-btn" id="sendBtn" title="Send message" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"/>
                                <polyline points="5 12 12 5 19 12"/>
                            </svg>
                        </button>
                        <button class="stop-btn hidden" id="stopBtn" title="Stop generating">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="input-disclaimer">JARVIS uses Gemini AI. Responses may not always be accurate.</p>
            </div>
        </main>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
